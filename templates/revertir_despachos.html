{% extends "base.html" %}
{% block contenido %}

<h2>Revertir Despachos</h2>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Fecha Despacho</label>
        <input type="date" name="fecha_despacho" class="form-control" required>
    </div>
    <h4>Tiendas Despachadas</h4>
    {% for tienda in tiendas %}
    <div class="form-check">
        <input class="checkbox" class="form-check-input" name="tiendas" value="{{ tienda[0] }}">
        <label class="form-check-label">
            {{ tienda[0] }} 
        </label>
    </div>
    {%endfor %}

    <br>

    <button
        type="submit"
        class="btn btn-warning"
        onclick="return confirm('¿Deseas volver estos registros a PENDIENTE?')"
    >
        Revertir
    </button>
</form>
{% endblock %}
