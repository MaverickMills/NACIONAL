<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PackingList {% endblock %} - Sistema Nacional</title>
    
    {# Bootstrap 5 CSS #}
    <link href="https://cdn.jsdelivr.net/npm/boostrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    {# Bootstrap 5 Icons #}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    {# Google Fonts: Inter para UI limpia y profesional #}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-w: 240px;
            --header-h: 56px;

            /* Paleta: azul corporativo oscuro + acentos teal y slate */
            --col-bg:        #0f172a;   /*sidebar fondo*/  
            --col-bg-hover:  #1e293b;   /*sidebar hover*/
            --col-accent:    #0ea5e9;   /*teal activo*/
            --col-accent-dim:#0369a1;   /*teal oscuro*/
            --col-text-light:#cbd5e1;   /*texto sidebar*/
            --col-text-muted:#64748b;   /*subtextos*/
            --col-surface:   #f8fafc;   /*fondo pagina*/
            --col-card:      #ffffff;   /*tarjetas*/
            --col-border:    #e2e8f0;   /*bordes*/

            /* Sombras */
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / .07), 0 1px 2px -1px rgb(0 0 0 / .07);
            --shadow-mp: 0 4px 6px -1px rgb(0 0 0 / .07), 0 2px 4px -2px rgb(0 0 0 / .07);

        /*RESET Y BASE*/
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 14px;
            background: var(--col-surface);
            color: #1e293b;
            margin: 0;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--col-bg);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-brand{
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }

        .sidebar-brand .brand-title {
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: .04em;
            line-height: 1.2;
        }

        .sidebar-brand .brand-sub {
            font-size: 11px;
            color: var(--col-text-muted);
            margin-top: 2px;
        }

        .sidebar-section {
            padding: 16px 12px 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--col-text-muted);
        }

        .sidebar-nav {
            list-style: none;
            margin: 0;
            padding: 0 8px;
        }

        .sidebar-nav li + li {margin-top: 2px;}

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--col-text-light);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 450;
            transition: background .15s, color .15s;
        }

        .sidebar-nav a:hover {
            background: var(--col-bg-hover);
            color: #fff;
        }

        .sidebar-nav a i {
            font-size: 16px;
            opacity: .85;
            flex-shrink: 0;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,.06);
            font-size: 11px;
            color: var(--col-text-muted);
        }
        /* CONTENIDO PRINCIPAL */
        
        .main-wrap {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            height: var(--header-h);
            background: var(--col-card);
            border-bottom: 1px solid var(--col-border);
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: #1e293b;
        }

        .topbar-breadcrumb {
            font-size: 12px;
            color: var(--col-text-muted);
            margin-left: auto;
        }

        /* Area de contenido */
        .page-content {
            flex: 1;
            padding: 28px;
        }

        /* COMPONENTES - Tarjetas de metrica */
        .metric-card {
            background: var(--col-card);
            border: 1px solid var(--col-border);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .2s;
        }

        .metric-card:hover { box-shadow: var(--shadow-md); }

        .metric-card .metric-label {
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: var(--col-text-muted);
            margin-bottom: 8px;
        }

        .metric-card .metric-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
            color: #0f172a;
        }

        .metric-card .metric-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* COMPONENTES - Tablas */
        .table.card {
            background: var(--col-card);
            border: 1px solid var(--col-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-card .table {
            margin: 0;
            font-size: 13px;
        }

        .table-card .table thead th {
            background: #f8fafc;
            border-bottom: 1px solid var(--col-border);
            font-weight: 600;
            font-size: 11.5px;
            letter-spacing: .03em;
            text-transform: uppercase;
            color: var(--col-text-muted);
            padding: 12px 16px;
            white-space: nowrap;
        }

        .table-card .table td {
            padding: 11px 16px;
            vertical-align: middle;
            border-color: var(--col-border);
        }

        .table-card .table tbody tr:hover { background: #f8fafc;}

        /* BADGES DE ESTADO */

        .badge-pendiente {
            background: #fef3c7;
            color: #92400e;
            font-weight: 600;
            font-size: 600;
            padding: 3px 9px;
            border-radius: 20px;
        }
        
        .badge-despachado {
            background: #dcfce7;
            color: #166534;
            font-weight: 600;
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
        }

        .badge-abierta {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 600;
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
        }

        .badge-cerrada {
            background: #f3f4f6;
            color: #374151;
            font-weight: 600;
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
        }

        /* ALERTA FLASH*/
        
        .flash-container {
            position: fixed;
            top: calc(var(--header-h) + 12px);
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }

        .flash-alert {
            border-radius: 10px;
            border: none;
            padding: 12px 16px;
            font-size: 13.5px;
            box-shadow: var(--shadow-md);
            animation: slideIn .2s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to   { transform:translateX(0);     opacity: 1; }
        }

        /* FILTROS */

        .filter-bar {
            background: var(--col-card);
            border: 1px solid var(--col-border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        /* BOTONES */

        .btn-primary {
            background: var(--col-accent);
            border-color: var(--col-accent);
            font-weight: 500;
        }

        .btn-primary:hover {
            background: var(--col-accent-dim);
            border-color: var(--col-accent-dim);
        }

        /* FORMULARIOS */

        .form-card {
            background: var(--col-card);
            border: 1px solid var(--col-border);
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow-sm);
            max-width: 640px;
        }

        .form-label {
            font-weight: 500;
            font-size: 13px;
            color: #374151;
        }
        }
    </style>
</head>
<body>
    
</body>
</html>
